<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital SAT Prep Suite</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- MathJax for Beautiful Math Rendering -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        /* Custom scrollbar for sidebar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans transition-colors duration-200 dark:bg-slate-900 dark:text-slate-100">

    <!-- Top Navigation Bar (Bluebook Style) -->
    <header class="bg-blue-900 text-white px-6 py-4 flex justify-between items-center shadow-md sticky top-0 z-50 dark:bg-slate-950">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-graduation-cap text-2xl text-amber-400"></i>
            <span class="text-xl font-bold tracking-tight">Digital SAT Practice Test</span>
        </div>
        
        <!-- Accessibility & Theme Controls -->
        <div class="flex items-center space-x-6">
            <!-- Font Size Adjuster -->
            <div class="flex items-center bg-blue-800 rounded-lg p-1 dark:bg-slate-800">
                <button onclick="changeFontSize(-1)" class="px-3 py-1 hover:bg-blue-700 rounded text-sm font-bold transition">-A</button>
                <span id="font-size-label" class="px-2 text-xs font-semibold">100%</span>
                <button onclick="changeFontSize(1)" class="px-3 py-1 hover:bg-blue-700 rounded text-sm font-bold transition">+A</button>
            </div>
            <!-- Dark Mode Toggle -->
            <button onclick="toggleDarkMode()" class="text-xl hover:text-amber-400 transition p-1">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
            <!-- Timer Display -->
            <div class="flex items-center space-x-2 bg-amber-500 text-slate-950 px-4 py-1.5 rounded-full font-mono font-bold shadow-sm">
                <i class="fa-regular fa-clock"></i>
                <span id="timer-display">35:00</span>
            </div>
        </div>
    </header>

    <div class="max-w-[1600px] mx-auto flex min-h-[calc(100vh-68px)]">
        <!-- Left Sidebar: Question Navigation -->
        <aside class="w-80 bg-white border-r border-slate-200 p-6 flex flex-col justify-between hidden md:flex dark:bg-slate-800 dark:border-slate-700">
            <div>
                <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-4">Questions</h2>
                <div id="question-grid" class="grid grid-cols-4 gap-3 custom-scrollbar overflow-y-auto max-h-[50vh] pr-1">
                    <!-- Dynamic Grid Items -->
                </div>
            </div>
            
            <!-- Progress Bar & Actions -->
            <div class="mt-6 border-t border-slate-100 pt-6 dark:border-slate-700">
                <div class="flex justify-between text-xs font-medium mb-1 text-slate-500 dark:text-slate-400">
                    <span>Progress</span>
                    <span id="progress-text">0/5 Completed</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2 mb-6 dark:bg-slate-700">
                    <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <button onclick="resetApp()" class="w-full bg-slate-100 text-slate-600 font-medium py-2.5 rounded-xl hover:bg-red-50 hover:text-red-600 transition text-sm flex items-center justify-center space-x-2 dark:bg-slate-700 dark:text-slate-300 dark:hover:bg-red-950/40 dark:hover:text-red-400">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>Reset Test Data</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 p-6 lg:p-12 flex flex-col justify-between max-w-4xl mx-auto">
            <!-- Question Content Card -->
            <div id="question-card" class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 mb-8 transition-all dark:bg-slate-800 dark:border-slate-700">
                <!-- Category/Type Tag -->
                <span id="question-tag" class="inline-block bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1 rounded-full mb-6 uppercase tracking-wide dark:bg-blue-950/50 dark:text-blue-400">
                    Loading...
                </span>
                
                <!-- Main Passage / Context (Dynamic FontSize) -->
                <div id="question-passage" class="prose max-w-none text-slate-700 mb-6 leading-relaxed dark:text-slate-300">
                    <!-- Dynamic Text -->
                </div>

                <!-- Core Question Prompt -->
                <p id="question-prompt" class="font-semibold text-lg mb-8 text-slate-900 dark:text-white">
                    <!-- Dynamic Text -->
                </p>

                <!-- Multiple Choice Options -->
                <div id="options-container" class="space-y-3.5 mb-8">
                    <!-- Dynamic Options -->
                </div>

                <!-- Instant Explanation Panel (Initially Hidden) -->
                <div id="explanation-box" class="hidden mt-6 p-5 bg-emerald-50 border border-emerald-200 rounded-xl dark:bg-emerald-950/30 dark:border-emerald-800/50">
                    <div class="flex items-start space-x-3">
                        <i class="fa-solid fa-circle-check text-emerald-500 text-xl mt-0.5"></i>
                        <div>
                            <h4 class="font-bold text-emerald-900 dark:text-emerald-400 mb-1">Answer Key & Explanation</h4>
                            <p id="explanation-text" class="text-sm text-emerald-800 leading-relaxed dark:text-emerald-300"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Control Action Bar -->
            <div class="flex justify-between items-center">
                <button id="btn-prev" onclick="navigateQuestion(-1)" class="px-5 py-3 rounded-xl border border-slate-200 font-medium hover:bg-slate-100 transition disabled:opacity-40 disabled:hover:bg-transparent dark:border-slate-700 dark:hover:bg-slate-700">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Previous
                </button>
                
                <!-- Center Interaction Buttons -->
                <div class="flex space-x-3">
                    <button id="btn-reveal" onclick="toggleExplanation()" class="px-5 py-3 rounded-xl bg-slate-100 text-slate-700 font-medium hover:bg-slate-200 transition dark:bg-slate-700 dark:text-slate-200 dark:hover:bg-slate-600">
                        <i class="fa-regular fa-lightbulb mr-2"></i> Check Answer
                    </button>
                </div>

                <button id="btn-next" onclick="navigateQuestion(1)" class="px-5 py-3 rounded-xl bg-blue-600 text-white font-medium hover:bg-blue-700 shadow-md transition dark:bg-blue-500 dark:hover:bg-blue-600">
                    Next <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
        </main>
    </div>

    <!-- JavaScript Engine -->
    <script>
        // High-Quality Digital SAT Data Bank (Reading & Writing + Math with Graphs & LaTeX)
        const satQuestions = [
            {
                id: 1,
                tag: "Reading and Writing: Information and Ideas",
                passage: "In the early 20th century, many traditional sociologists argued that urbanization inevitably weakened community ties, isolating individuals in impersonal landscapes. However, recent studies by urban anthropologists suggest that modern city dwellers frequently form tight-knit, localized subcultures centered around shared occupations or interests. These micro-communities replicate the mutual support networks traditionally associated with rural settings, thereby demonstrating that the dense social fabric of cities can foster alternative modes of social cohesion.",
                prompt: "Which choice best summarizes the main idea of the text?",
                options: [
                    "A. Urbanization inherently destroys traditional social structures and leaves citizens isolated.",
                    "B. Modern city dwellers prefer rural lifestyles but are forced to adapt to dense environments.",
                    "C. Recent research challenges the older view that cities completely erode meaningful social connections.",
                    "D. Micro-communities in urban areas are unstable because they rely entirely on occupational interests."
                ],
                correct: 2, // Index C
                explanation: "Correct answer: <b>C</b>. The passage contrasts the older view (cities destroy ties) with modern findings (cities foster alternative subcultures that replicate rural networks). Therefore, it directly challenges the notion that city life completely erodes social cohesion."
            },
            {
                id: 2,
                tag: "Reading and Writing: Craft and Structure (Words in Context)",
                passage: "The archival records from the 18th-century judicial system were long considered entirely lost. However, historian Dr. Evelyn Vance recently uncovered a cache of municipal documents that had been misfiled in an auxiliary warehouse. Far from being completely destroyed, the records were remarkably ________, requiring only minimal conservation work to preserve their legible text.",
                prompt: "Which choice completes the text with the most logical and precise word?",
                options: [
                    "A. pristine",
                    "B. obsolete",
                    "C. redundant",
                    "D. hazardous"
                ],
                correct: 0, // Index A
                explanation: "Correct answer: <b>A</b>. The text states the documents required 'only minimal conservation' to keep their text legible, meaning they were found in excellent condition. 'Pristine' perfectly matches this state of being fresh and clean."
            },
            {
                id: 3,
                tag: "Math: Advanced Math (Quadratic Functions)",
                passage: "A projectile is launched from a platform. The height $h(t)$, in meters, of the projectile above the ground $t$ seconds after launch is modeled by the function: <br><br>$$h(t) = -4.9t^2 + 19.6t + 14.7$$",
                prompt: "Which of the following equivalent forms of the function explicitly displays the maximum height of the projectile as a constant or coefficient?",
                options: [
                    "A. $h(t) = -4.9(t - 2)^2 + 34.3$",
                    "B. $h(t) = -4.9(t^2 - 4t - 3)$",
                    "C. $h(t) = -4.9(t - 4.65)(t + 0.65)$",
                    "D. $h(t) = -4.9t(t - 4) + 14.7$"
                ],
                correct: 0, // Index A
                explanation: "Correct answer: <b>A</b>. To explicitly find the maximum height, we look for the <b>vertex form</b> of a quadratic function, $k(x-h)^2 + p$, where the constant $p$ represents the maximum or minimum value. $h(t) = -4.9(t-2)^2 + 34.3$ clearly indicates that the vertex occurs at $t = 2$ seconds, yielding a maximum height of $34.3$ meters."
            },
            {
                id: 4,
                tag: "Math: Problem Solving and Data Analysis (Graph Interpretation)",
                passage: "Below is a summary table representing the distribution of surveyed target populations and their preferred digital reading formats: <br><br><table class='w-full border-collapse border border-slate-300 text-left my-4 dark:border-slate-600'><thead class='bg-slate-100 dark:bg-slate-700'><tr><th class='border border-slate-300 p-2 dark:border-slate-600'>Age Group</th><th class='border border-slate-300 p-2 dark:border-slate-600'>E-Books</th><th class='border border-slate-300 p-2 dark:border-slate-600'>Audiobooks</th><th class='border border-slate-300 p-2 dark:border-slate-600'>Total</th></tr></thead><tbody><tr><td class='border border-slate-300 p-2 dark:border-slate-600'>18–34</td><td class='border border-slate-300 p-2 dark:border-slate-600'>45</td><td class='border border-slate-300 p-2 dark:border-slate-600'>55</td><td class='border border-slate-300 p-2 dark:border-slate-600'>100</td></tr><tr><td class='border border-slate-300 p-2 dark:border-slate-600'>35+</td><td class='border border-slate-300 p-2 dark:border-slate-600'>60</td><td class='border border-slate-300 p-2 dark:border-slate-600'>40</td><td class='border border-slate-300 p-2 dark:border-slate-600'>100</td></tr><tr><td class='border border-slate-300 p-2 dark:border-slate-600'>Total</td><td class='border border-slate-300 p-2 dark:border-slate-600'>105</td><td class='border border-slate-300 p-2 dark:border-slate-600'>95</td><td class='border border-slate-300 p-2 dark:border-slate-600'>200</td></tr></tbody></table>",
                prompt: "If a surveyed person who prefers Audiobooks is chosen at random, what is the probability that the person belongs to the 18–34 age group?",
                options: [
                    "A. $\\frac{55}{200}$",
                    "B. $\\frac{55}{95}$",
                    "C. $\\frac{55}{100}$",
                    "D. $\\frac{95}{200}$"
                ],
                correct: 1, // Index B
                explanation: "Correct answer: <b>B</b>. This is a conditional probability question. The condition restricts our sample pool specifically to those who prefer <b>Audiobooks</b> (total = $95$). Within that specific subset, the number of individuals in the 18–34 bracket is $55$. Therefore, the probability is $\\frac{55}{95}$."
            },
            {
                id: 5,
                tag: "Math: Geometry and Trigonometry",
                passage: "In a right triangle $ABC$, angle $B$ is equal to $90^\\circ$. If $\\cos(A) = \\frac{5}{13}$, we want to investigate the related trigonometric values for the remaining acute angle.",
                prompt: "What is the value of $\\sin(C)$?",
                options: [
                    "A. $\\frac{5}{13}$",
                    "B. $\\frac{12}{13}$",
                    "C. $\\frac{13}{5}$",
                    "D. $\\frac{5}{12}$"
                ],
                correct: 0, // Index A
                explanation: "Correct answer: <b>A</b>. In any right triangle, the acute angles are complementary ($A + C = 90^\\circ$). By the co-function identity of trigonometry, $\\sin(C) = \\sin(90^\\circ - A) = \\cos(A)$. Since $\\cos(A) = \\frac{5}{13}$, $\\sin(C)$ must also equal $\\frac{5}{13}$."
            }
        ];

        // State variables managed locally
        let currentIndex = 0;
        let userAnswers = {}; // Format: { questionId: selectedOptionIndex }
        let timeRemaining = 2100; // 35 minutes in seconds
        let fontSizeScale = 100; // Base percentage
        let revealedExplanations = {}; // Format: { questionId: boolean }

        // Core initialization on layout load
        window.addEventListener('DOMContentLoaded', () => {
            loadProgress();
            renderSidebar();
            displayQuestion();
            startTimer();
            applySavedTheme();
        });

        // Sync and render current question details
        function displayQuestion() {
            const q = satQuestions[currentIndex];
            
            // Render text contents
            document.getElementById('question-tag').innerText = q.tag;
            document.getElementById('question-passage').innerHTML = q.passage;
            document.getElementById('question-prompt').innerHTML = q.prompt;

            // Render option nodes safely
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const isSelected = userAnswers[q.id] === idx;
                const optButton = document.createElement('button');
                optButton.className = `w-full text-left p-4 rounded-xl border transition flex items-center space-x-4 group ${
                    isSelected 
                    ? 'border-blue-600 bg-blue-50/50 dark:border-blue-500 dark:bg-blue-950/30' 
                    : 'border-slate-200 hover:bg-slate-50 dark:border-slate-700 dark:hover:bg-slate-700/50'
                }`;
                optButton.onclick = () => selectOption(idx);
                
                // Option prefix marker (A, B, C, D)
                const prefix = String.fromCharCode(65 + idx);
                optButton.innerHTML = `
                    <span class="w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm transition ${
                        isSelected 
                        ? 'bg-blue-600 text-white' 
                        : 'bg-slate-100 text-slate-600 group-hover:bg-slate-200 dark:bg-slate-700 dark:text-slate-300'
                    }">${prefix}</span>
                    <span class="font-medium">${opt}</span>
                `;
                container.appendChild(optButton);
            });

            // Adjust navigation button disabled statuses
            document.getElementById('btn-prev').disabled = currentIndex === 0;
            document.getElementById('btn-next').disabled = currentIndex === satQuestions.length - 1;

            // Manage the real-time explanation state
            const expBox = document.getElementById('explanation-box');
            if (revealedExplanations[q.id]) {
                document.getElementById('explanation-text').innerHTML = q.explanation;
                expBox.classList.remove('hidden');
            } else {
                expBox.classList.add('hidden');
            }

            // Fire off LaTeX processing dynamically via MathJax
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise();
            }
        }

        // Handle structural choice selecting
        function selectOption(idx) {
            const q = satQuestions[currentIndex];
            userAnswers[q.id] = idx;
            saveProgress();
            updateProgressMetrics();
            renderSidebar();
            displayQuestion();
        }

        // Toggle visibility for real-time explanatory notes
        function toggleExplanation() {
            const q = satQuestions[currentIndex];
            revealedExplanations[q.id] = !revealedExplanations[q.id];
            saveProgress();
            displayQuestion();
        }

        // Navigate between items linear index scale
        function navigateQuestion(direction) {
            currentIndex += direction;
            // Prevent going out of range bounds
            if(currentIndex < 0) currentIndex = 0;
            if(currentIndex >= satQuestions.length) currentIndex = satQuestions.length - 1;
            displayQuestion();
        }

        function jumpToQuestion(index) {
            currentIndex = index;
            displayQuestion();
        }

        // Render sidebar indicators dynamically
        function renderSidebar() {
            const grid = document.getElementById('question-grid');
            grid.innerHTML = '';

            satQuestions.forEach((q, idx) => {
                const isCurrent = idx === currentIndex;
                const isAnswered = userAnswers[q.id] !== undefined;
                
                const gridItem = document.createElement('button');
                gridItem.className = `h-12 w-12 rounded-xl font-bold text-sm transition flex items-center justify-center border ${
                    isCurrent 
                    ? 'border-blue-600 text-blue-600 ring-2 ring-blue-600/20 dark:border-blue-400 dark:text-blue-400' 
                    : isAnswered 
                    ? 'bg-blue-600 border-blue-600 text-white dark:bg-blue-500 dark:border-blue-500' 
                    : 'border-slate-200 text-slate-400 hover:border-slate-400 dark:border-slate-700 dark:text-slate-500'
                }`;
                gridItem.innerText = q.id;
                gridItem.onclick = () => jumpToQuestion(idx);
                grid.appendChild(gridItem);
            });
        }

        // Live calculation and translation of progress indices
        function updateProgressMetrics() {
            const completedCount = Object.keys(userAnswers).length;
            const total = satQuestions.length;
            const percentage = (completedCount / total) * 100;

            document.getElementById('progress-text').innerText = `${completedCount}/${total} Completed`;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        // Dynamic Countdown Engine
        function startTimer() {
            const display = document.getElementById('timer-display');
            const countdown = setInterval(() => {
                if (timeRemaining <= 0) {
                    clearInterval(countdown);
                    display.innerText = "Time Up";
                    alert("Time is up! Let's check your results.");
                    return;
                }
                timeRemaining--;
                saveProgress();

                const mins = Math.floor(timeRemaining / 60);
                const secs = timeRemaining % 60;
                display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // Font scaling responsive module
        function changeFontSize(direction) {
            fontSizeScale += direction * 10;
            if (fontSizeScale < 80) fontSizeScale = 80;
            if (fontSizeScale > 150) fontSizeScale = 150;
            
            document.getElementById('font-size-label').innerText = `${fontSizeScale}%`;
            document.getElementById('question-passage').style.fontSize = `${fontSizeScale}%`;
            document.getElementById('question-prompt').style.fontSize = `${fontSizeScale}%`;
            saveProgress();
        }

        // Standard CSS Dark Mode Controller
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-icon').className = isDark ? "fa-solid fa-sun" : "fa-solid fa-moon";
            localStorage.setItem('sat_dark_mode', isDark);
        }

        function applySavedTheme() {
            const savedTheme = localStorage.getItem('sat_dark_mode') === 'true';
            if (savedTheme) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').className = "fa-solid fa-sun";
            }
        }

        // Save & Load Engine utilizing browser local storage context
        function saveProgress() {
            const dataState = {
                userAnswers,
                timeRemaining,
                fontSizeScale,
                revealedExplanations,
                currentIndex
            };
            localStorage.setItem('sat_practice_state', JSON.stringify(dataState));
        }

        function loadProgress() {
            const saved = localStorage.getItem('sat_practice_state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    userAnswers = parsed.userAnswers || {};
                    timeRemaining = parsed.timeRemaining !== undefined ? parsed.timeRemaining : 2100;
                    fontSizeScale = parsed.fontSizeScale || 100;
                    revealedExplanations = parsed.revealedExplanations || {};
                    currentIndex = parsed.currentIndex || 0;

                    // Apply UI text metrics manually
                    document.getElementById('font-size-label').innerText = `${fontSizeScale}%`;
                    document.getElementById('question-passage').style.fontSize = `${fontSizeScale}%`;
                    document.getElementById('question-prompt').style.fontSize = `${fontSizeScale}%`;
                    updateProgressMetrics();
                } catch (e) {
                    console.error("Error reading storage values", e);
                }
            }
        }

        // Hard reset to default state
        function resetApp() {
            if (confirm("Are you sure you want to clear all progress and reset the timer?")) {
                localStorage.removeItem('sat_practice_state');
                userAnswers = {};
                timeRemaining = 2100;
                revealedExplanations = {};
                currentIndex = 0;
                fontSizeScale = 100;
                
                // Re-sync UI manually
                document.getElementById('font-size-label').innerText = `100%`;
                document.getElementById('question-passage').style.fontSize = `100%`;
                document.getElementById('question-prompt').style.fontSize = `100%`;
                
                updateProgressMetrics();
                renderSidebar();
                displayQuestion();
            }
        }
    </script>
</body>
</html>
