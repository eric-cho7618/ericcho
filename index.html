<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital SAT Adaptive Test Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans transition-colors duration-200 dark:bg-slate-900 dark:text-slate-100">

    <div id="loading-screen" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center text-white">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-amber-400 border-t-transparent mb-4"></div>
        <p class="text-lg font-semibold tracking-wide animate-pulse">Fetching Real-time SAT Questions from API...</p>
    </div>

    <header class="bg-blue-900 text-white px-6 py-4 flex justify-between items-center shadow-md sticky top-0 z-50 dark:bg-slate-950">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-cloud-arrow-down text-2xl text-amber-400 animate-bounce"></i>
            <span class="text-xl font-bold tracking-tight">Digital SAT Live API Simulator</span>
        </div>
        
        <div class="flex items-center space-x-6">
            <div class="flex items-center bg-blue-800 rounded-lg p-1 dark:bg-slate-800">
                <button onclick="changeFontSize(-1)" class="px-3 py-1 hover:bg-blue-700 rounded text-sm font-bold transition">-A</button>
                <span id="font-size-label" class="px-2 text-xs font-semibold">100%</span>
                <button onclick="changeFontSize(1)" class="px-3 py-1 hover:bg-blue-700 rounded text-sm font-bold transition">+A</button>
            </div>
            <button onclick="toggleDarkMode()" class="text-xl hover:text-amber-400 transition p-1">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
            <div class="flex items-center space-x-2 bg-amber-500 text-slate-950 px-4 py-1.5 rounded-full font-mono font-bold shadow-sm">
                <i class="fa-regular fa-clock"></i>
                <span id="timer-display">60:00</span>
            </div>
        </div>
    </header>

    <div class="max-w-[1600px] mx-auto flex min-h-[calc(100vh-68px)]">
        <aside class="w-80 bg-white border-r border-slate-200 p-6 flex flex-col justify-between hidden md:flex dark:bg-slate-800 dark:border-slate-700">
            <div>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Live Pool (1-20)</h2>
                    <button onclick="fetchNewQuestions()" class="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded hover:bg-blue-100 transition dark:bg-blue-950 dark:text-blue-400" title="Load a completely new set of random questions from API">
                        <i class="fa-solid fa-sync mr-1"></i> New Set
                    </button>
                </div>
                <div id="question-grid" class="grid grid-cols-4 gap-2.5 custom-scrollbar overflow-y-auto max-h-[65vh] pr-1">
                    </div>
            </div>
            
            <div class="mt-6 border-t border-slate-100 pt-6 dark:border-slate-700">
                <div class="flex justify-between text-xs font-medium mb-1 text-slate-500 dark:text-slate-400">
                    <span>Progress</span>
                    <span id="progress-text">0/20 Completed</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2 mb-6 dark:bg-slate-700">
                    <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <button onclick="resetApp()" class="w-full bg-slate-100 text-slate-600 font-medium py-2.5 rounded-xl hover:bg-red-50 hover:text-red-600 transition text-sm flex items-center justify-center space-x-2 dark:bg-slate-700 dark:text-slate-300 dark:hover:bg-red-950/40 dark:hover:text-red-400">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>Reset Current Answers</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-12 flex flex-col justify-between max-w-4xl mx-auto">
            <div id="question-card" class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 mb-8 transition-all dark:bg-slate-800 dark:border-slate-700">
                <span id="question-tag" class="inline-block bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1 rounded-full mb-6 uppercase tracking-wide dark:bg-blue-950/50 dark:text-blue-400">
                    Loading...
                </span>
                
                <div id="graphic-container" class="mb-6 flex justify-center bg-slate-50 rounded-xl p-4 hidden dark:bg-slate-900/50"></div>
                
                <div id="question-passage" class="prose max-w-none text-slate-700 mb-6 leading-relaxed dark:text-slate-300"></div>

                <p id="question-prompt" class="font-semibold text-lg mb-8 text-slate-900 dark:text-white"></p>

                <div id="options-container" class="space-y-3.5 mb-8"></div>

                <div id="explanation-box" class="hidden mt-6 p-5 bg-emerald-50 border border-emerald-200 rounded-xl dark:bg-emerald-950/30 dark:border-emerald-800/50">
                    <div class="flex items-start space-x-3">
                        <i class="fa-solid fa-circle-check text-emerald-500 text-xl mt-0.5"></i>
                        <div>
                            <h4 class="font-bold text-emerald-900 dark:text-emerald-400 mb-1">Answer Key & Explanation</h4>
                            <p id="explanation-text" class="text-sm text-emerald-800 leading-relaxed dark:text-emerald-300"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center">
                <button id="btn-prev" onclick="navigateQuestion(-1)" class="px-5 py-3 rounded-xl border border-slate-200 font-medium hover:bg-slate-100 transition disabled:opacity-40 disabled:hover:bg-transparent dark:border-slate-700 dark:hover:bg-slate-700">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Previous
                </button>
                
                <button id="btn-reveal" onclick="toggleExplanation()" class="px-5 py-3 rounded-xl bg-slate-100 text-slate-700 font-medium hover:bg-slate-200 transition dark:bg-slate-700 dark:text-slate-200 dark:hover:bg-slate-600">
                    <i class="fa-regular fa-lightbulb mr-2"></i> Check Answer
                </button>

                <button id="btn-next" onclick="navigateQuestion(1)" class="px-5 py-3 rounded-xl bg-blue-600 text-white font-medium hover:bg-blue-700 shadow-md transition dark:bg-blue-500 dark:hover:bg-blue-600">
                    Next <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        // 글로벌 오픈 프로젝트 기반 대용량 Digital SAT 문제셋 피드 연동 엔드포인트
        const DATA_API_URL = "https://raw.githubusercontent.com/Marvins-Lab/sat-question-bank-api/main/data/sat_premium_pool.json";

        let satQuestions = []; // API로부터 실시간 다운로드되어 바인딩될 공간
        let currentIndex = 0;
        let userAnswers = {};
        let timeRemaining = 3600;
        let fontSizeScale = 100;
        let revealedExplanations = {};

        window.addEventListener('DOMContentLoaded', () => {
            applySavedTheme();
            fetchQuestionsFromAPI();
        });

        // 1단계: 외부 대용량 API 주소에서 데이터를 비동기로 긁어와 무작위로 20문제 추출
        async function fetchQuestionsFromAPI() {
            document.getElementById('loading-screen').classList.remove('hidden');
            try {
                const response = await fetch(DATA_API_URL);
                if (!response.ok) throw new Error("API Connection Failed");
                const fullPool = await response.json();
                
                // 받아온 전체 리스트에서 무작위로 섞어 20문제만 슬라이싱(동적 셔플)
                const shuffled = fullPool.sort(() => 0.5 - Math.random());
                satQuestions = shuffled.slice(0, 20).map((item, idx) => {
                    item.id = idx + 1; // 1~20 순번 재정의
                    return item;
                });

                // 풀이 세션이 이미 저장되어 있다면 매핑 복구
                loadProgress();
                renderSidebar();
                displayQuestion();
                startTimer();
            } catch (error) {
                console.error("Using localized failover array engine due to network block:", error);
                alert("네트워크 차단으로 임시 가상 데이터 풀을 작동합니다.");
                // 백업 엔진 호출
                generateFallbackPool();
            } finally {
                document.getElementById('loading-screen').classList.add('hidden');
            }
        }

        // 완전히 새로운 문제 세트를 로드하고 싶을 때 실행하는 버튼 기능
        function fetchNewQuestions() {
            if (confirm("현재 풀이 기록을 지우고 완전히 새로운 실시간 문제셋을 API에서 받아올까요?")) {
                localStorage.removeItem('sat_api_progress');
                userAnswers = {};
                revealedExplanations = {};
                currentIndex = 0;
                timeRemaining = 3600;
                fetchQuestionsFromAPI();
            }
        }

        function displayQuestion() {
            if (!satQuestions || satQuestions.length === 0) return;
            const q = satQuestions[currentIndex];
            
            document.getElementById('question-tag').innerText = q.tag || "Digital SAT Domain Task";
            document.getElementById('question-passage').innerHTML = q.passage || "";
            document.getElementById('question-prompt').innerHTML = q.prompt || "";

            // Dynamic Vector Graphics Engine parsing
            const graphicContainer = document.getElementById('graphic-container');
            if (q.graphic && q.graphic.trim() !== "") {
                graphicContainer.innerHTML = q.graphic;
                graphicContainer.classList.remove('hidden');
            } else {
                graphicContainer.classList.add('hidden');
            }

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const optionsList = q.options || [];
            optionsList.forEach((opt, idx) => {
                const isSelected = userAnswers[q.id] === idx;
                const optButton = document.createElement('button');
                optButton.className = `w-full text-left p-4 rounded-xl border transition flex items-center space-x-4 group ${
                    isSelected 
                    ? 'border-blue-600 bg-blue-50/50 dark:border-blue-500 dark:bg-blue-950/30' 
                    : 'border-slate-200 hover:bg-slate-50 dark:border-slate-700 dark:hover:bg-slate-700/50'
                }`;
                optButton.onclick = () => selectOption(idx);
                
                const prefix = String.fromCharCode(65 + idx);
                optButton.innerHTML = `
                    <span class="w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm transition ${
                        isSelected 
                        ? 'bg-blue-600 text-white' 
                        : 'bg-slate-100 text-slate-600 group-hover:bg-slate-200 dark:bg-slate-700 dark:text-slate-300'
                    }">${prefix}</span>
                    <span class="font-medium">${opt}</span>
                `;
                container.appendChild(optButton);
            });

            document.getElementById('btn-prev').disabled = currentIndex === 0;
            document.getElementById('btn-next').disabled = currentIndex === satQuestions.length - 1;

            const expBox = document.getElementById('explanation-box');
            if (revealedExplanations[q.id]) {
                document.getElementById('explanation-text').innerHTML = q.explanation || "No explanation provided.";
                expBox.classList.remove('hidden');
            } else {
                expBox.classList.add('hidden');
            }

            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise();
            }
        }

        function selectOption(idx) {
            const q = satQuestions[currentIndex];
            userAnswers[q.id] = idx;
            saveProgress();
            updateProgressMetrics();
            renderSidebar();
            displayQuestion();
        }

        function toggleExplanation() {
            const q = satQuestions[currentIndex];
            revealedExplanations[q.id] = !revealedExplanations[q.id];
            saveProgress();
            displayQuestion();
        }

        function navigateQuestion(direction) {
            currentIndex += direction;
            displayQuestion();
        }

        function jumpToQuestion(index) {
            currentIndex = index;
            displayQuestion();
        }

        function renderSidebar() {
            const grid = document.getElementById('question-grid');
            grid.innerHTML = '';

            satQuestions.forEach((q, idx) => {
                const isCurrent = idx === currentIndex;
                const isAnswered = userAnswers[q.id] !== undefined;
                
                const gridItem = document.createElement('button');
                gridItem.className = `h-11 w-11 rounded-xl font-bold text-xs transition flex items-center justify-center border ${
                    isCurrent 
                    ? 'border-blue-600 text-blue-600 ring-2 ring-blue-600/20 dark:border-blue-400 dark:text-blue-400' 
                    : isAnswered 
                    ? 'bg-blue-600 border-blue-600 text-white dark:bg-blue-500 dark:border-blue-500' 
                    : 'border-slate-200 text-slate-400 hover:border-slate-400 dark:border-slate-700 dark:text-slate-500'
                }`;
                gridItem.innerText = q.id;
                gridItem.onclick = () => jumpToQuestion(idx);
                grid.appendChild(gridItem);
            });
        }

        function updateProgressMetrics() {
            const completedCount = Object.keys(userAnswers).length;
            const total = satQuestions.length;
            const percentage = total > 0 ? (completedCount / total) * 100 : 0;

            document.getElementById('progress-text').innerText = `${completedCount}/${total} Completed`;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        function startTimer() {
            if (window.timerInterval) clearInterval(window.timerInterval);
            const display = document.getElementById('timer-display');
            window.timerInterval = setInterval(() => {
                if (timeRemaining <= 0) {
                    clearInterval(window.timerInterval);
                    display.innerText = "Time Up";
                    return;
                }
                timeRemaining--;
                saveProgress();

                const mins = Math.floor(timeRemaining / 60);
                const secs = timeRemaining % 60;
                display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function changeFontSize(direction) {
            fontSizeScale += direction * 10;
            if (fontSizeScale < 80) fontSizeScale = 80;
            if (fontSizeScale > 150) fontSizeScale = 150;
            
            document.getElementById('font-size-label').innerText = `${fontSizeScale}%`;
            document.getElementById('question-passage').style.fontSize = `${fontSizeScale}%`;
            document.getElementById('question-prompt').style.fontSize = `${fontSizeScale}%`;
            saveProgress();
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-icon').className = isDark ? "fa-solid fa-sun" : "fa-solid fa-moon";
            localStorage.setItem('sat_dark_mode', isDark);
        }

        function applySavedTheme() {
            const savedTheme = localStorage.getItem('sat_dark_mode') === 'true';
            if (savedTheme) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').className = "fa-solid fa-sun";
            }
        }

        function saveProgress() {
            const dataState = { userAnswers, timeRemaining, fontSizeScale, revealedExplanations, currentIndex, satQuestions };
            localStorage.setItem('sat_api_progress', JSON.stringify(dataState));
        }

        function loadProgress() {
            const saved = localStorage.getItem('sat_api_progress');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // 같은 세션의 로드된 데이터 유지 구조 매핑
                    if (parsed.satQuestions && parsed.satQuestions.length > 0 && satQuestions.length === 0) {
                        satQuestions = parsed.satQuestions;
                    }
                    userAnswers = parsed.userAnswers || {};
                    timeRemaining = parsed.timeRemaining !== undefined ? parsed.timeRemaining : 3600;
                    fontSizeScale = parsed.fontSizeScale || 100;
                    revealedExplanations = parsed.revealedExplanations || {};
                    currentIndex = parsed.currentIndex || 0;

                    document.getElementById('font-size-label').innerText = `${fontSizeScale}%`;
                    document.getElementById('question-passage').style.fontSize = `${fontSizeScale}%`;
                    document.getElementById('question-prompt').style.fontSize = `${fontSizeScale}%`;
                    updateProgressMetrics();
                } catch (e) {
                    console.error(e);
                }
            }
        }

        function resetApp() {
            if (confirm("현재 마킹한 답안들을 전부 초기화할까요?")) {
                userAnswers = {};
                revealedExplanations = {};
                currentIndex = 0;
                saveProgress();
                updateProgressMetrics();
                renderSidebar();
                displayQuestion();
            }
        }

        // 백업 예외용 페일오버 디바이스 활성화
        function generateFallbackPool() {
            satQuestions = [
                {
                    tag: "Math: Geometry",
                    graphic: `<svg width="180" height="120" viewBox="0 0 180 120" class="stroke-slate-800 dark:stroke-slate-200 fill-none stroke-2"><polygon points="30,20 30,100 150,100" /><rect x="30" y="90" width="10" height="10" /><text x="80" y="115" class="fill-current stroke-none text-xs">x = 4</text><text x="15" y="65" class="fill-current stroke-none text-xs">3</text></svg>`,
                    passage: "A right triangle has legs of length $3$ and $4$.",
                    prompt: "What is the length of the hypotenuse?",
                    options: ["A. 5", "B. 6", "C. 7", "D. 8"],
                    correct: 0,
                    explanation: "Pythagorean triplet: $3^2 + 4^2 = 5^2$."
                }
            ];
            renderSidebar();
            displayQuestion();
            startTimer();
        }
    </script>
</body>
</html>
